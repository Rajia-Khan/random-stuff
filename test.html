<!doctype html>
<html>
  <head>
    <style>
      @font-face {
        font-family: "FoundersGrotesk";
        src: url("fonts/founders-grotesk-web-medium.woff") format("woff");
      }

      @font-face {
        font-family: "FoundersGroteskXCondensed";
        src: url("fonts/founders-grotesk-x-condensed-web-medium.eot") format("embedded-opentype");
      }

      body {
        font-family: "FoundersGrotesk", sans-serif;
        font-size: 200px;
        text-align: center;
      }

      .condensed-text {
        font-family: "FoundersGroteskXCondensed", sans-serif;
      }
    </style>
  </head>
  <body>
    <div>The quick brown fox jumps over the lazy dog.</div>
    <div class="condensed-text">Another line of text with condensed font.</div>
  </body>
</html>
